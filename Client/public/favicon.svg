<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Notebook cover -->
  <rect x="10" y="6" width="44" height="52" rx="5" ry="5" fill="#007bff"/>
  <!-- Spine highlight -->
  <rect x="10" y="6" width="8" height="52" rx="3" ry="3" fill="#0056b3"/>
  <!-- Page lines -->
  <line x1="24" y1="20" x2="46" y2="20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="28" x2="46" y2="28" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="46" y2="36" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="44" x2="38" y2="44" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Spiral rings -->
  <circle cx="18" cy="18" r="3" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="18" cy="32" r="3" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="18" cy="46" r="3" fill="none" stroke="#fff" stroke-width="2"/>
</svg>
